name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK (Ubuntu + Buildozer)
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y git zip unzip openjdk-17-jdk autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev build-essential ccache libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev libportmidi-dev libswscale-dev libavformat-dev libavcodec-dev libfreetype6-dev

      # ── 5. 這是修正 long 報錯的最關鍵步驟 ────────────────────────────
      - name: Install Buildozer and Fixed Cython
        run: |
          pip install --upgrade pip
          pip uninstall -y Cython
          pip install "Cython==0.29.33"
          pip install buildozer
          cython --version

      - name: Build debug APK
        working-directory: .
        run: |
          # 加上這行環境變數，強迫 p4a 使用主機上的 Cython
          export P4A_CYTHON_BIN=cython
          buildozer android debug
# ── 6. 打包 APK (加入更強制的版本鎖定) ─────────────────────────
      - name: Build debug APK
        working-directory: .
        run: |
          # 1. 先手動安裝 host 端需要的 Cython 包
          pip install "Cython<3.0"
          
          # 2. 強制告訴 buildozer 使用主機系統的 Cython，不要自己重下
          export P4A_cython_path=$(which cython)
          
          # 3. 執行打包，並加入 --requirements 的強制覆蓋
          buildozer android debug